<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALARM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #d00;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff; overflow: hidden;
    user-select: none;
  }
  .box { text-align: center; max-width: 90vw; }
  h1   { font-size: 8vw; font-weight: 900; letter-spacing: 0.2em; margin-bottom: 0.3em; }
  .sub { font-size: 2.5vw; font-weight: 300; opacity: 0.85; margin-bottom: 1.5em; overflow-wrap: break-word; word-break: break-word; }
  .now { font-size: 4vw; font-weight: 700; }
  .esc  { font-size: 1.2vw; opacity: 0.5; margin-top: 2em; }
</style>
</head>
<body>
<div class="box">
  <h1>ALARM</h1>
  <div class="sub">__MESSAGE__</div>
  <div class="now" id="clock"></div>
  <div class="esc">Kapatmak icin Cmd+W</div>
</div>
<script>
function tick() {
  var d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0') + ':' +
    String(d.getSeconds()).padStart(2,'0');
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
